<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome — STPM 2026 Kohort Baharu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:20px;padding:32px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.emoji{font-size:52px;margin-bottom:12px}
h2{font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:8px}
p{font-size:13px;color:#6b7280;line-height:1.7;margin-bottom:20px}
.btn{background:linear-gradient(135deg,#6c63ff,#4f46e5);color:#fff;border:none;padding:13px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:Arial,sans-serif}
</style>
</head>
<body>
<div class="box">
  <div class="emoji">🎓</div>
  <h2>Selamat Datang ke Portal Rasmi! 👋</h2>
  <p>Portal rasmi kumpulan Telegram @stpm20266 — semua maklumat STPM 2026 di satu tempat.</p>
  <button class="btn" onclick="masuk()">Masuk ke Portal →</button>
</div>
<iframe id="yt" width="0" height="0" style="position:absolute;opacity:0;top:-9999px" allow="autoplay" frameborder="0"></iframe>
<script>
function masuk(){
  var flowers=['🌸','🌺','🌼','🌻','🌹','🌷','💮'];
  var c=document.createElement('div');
  c.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden';
  document.body.appendChild(c);
  for(var i=0;i<60;i++){
    (function(idx){
      setTimeout(function(){
        var el=document.createElement('div');
        el.textContent=flowers[Math.floor(Math.random()*flowers.length)];
        var left=Math.random()*100;
        var size=16+Math.random()*20;
        var dur=2000+Math.random()*3000;
        var drift=(Math.random()-0.5)*200;
        var rot=Math.random()*720;
        el.style.cssText='position:absolute;left:'+left+'%;top:-60px;font-size:'+size+'px;opacity:1';
        c.appendChild(el);
        var start=Date.now();
        function anim(){
          var p=(Date.now()-start)/dur;
          if(p>=1){if(el.parentNode)el.parentNode.removeChild(el);return;}
          el.style.transform='translateY('+(p*window.innerHeight*1.1)+'px) translateX('+(drift*p)+'px) rotate('+(rot*p)+'deg)';
          el.style.opacity=p>0.8?1-(p-0.8)/0.2:1;
          requestAnimationFrame(anim);
        }
        requestAnimationFrame(anim);
      },idx*80);
    })(i);
  }
  setTimeout(function(){if(c.parentNode)c.parentNode.removeChild(c);},10000);
  var id='h1IeQ-4e0ok';
  document.getElementById('yt').src='https://www.youtube.com/embed/'+id+'?autoplay=1&loop=1&playlist='+id+'&controls=0&mute=0';
  setTimeout(function(){window.location.href='/';},1500);
}
</script>
</body>
</html>
